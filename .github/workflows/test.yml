name: Test

# Fast generator unit tests: runs every package's __tests__/ (Vitest) against its produce() in memory
# — no registry, npm install, or shadcn. Catches broken scope/name substitution and per-option wiring
# on every PR. The heavier dependency-resolution gate lives in template-install.yml.
#
# The `artifact` job below is the counterpart: everything else here inspects the WORKSPACE, and the
# workspace is not what users install. It packs and installs the real tarballs instead.
#
# PR-only, deliberately. main is rebase-only with linear history, and the ruleset requires a PR whose
# branch is up to date before merging — so the rebase is a fast-forward and the tree that lands on
# main is byte-identical to the one these jobs just passed. Re-running them on `push: main` bought
# nothing and tripled the job count of every merge. main is not left ungated: release.yml runs
# `pnpm test` before it publishes anything.

on:
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # commitlint below diffs base..head, so it needs the history

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      # pnpm comes from corepack, pinned by `packageManager`. The second setup-node
      # wires up the store cache, which needs pnpm on PATH already.
      - run: corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The husky hook only protects a local `git commit` — it can be skipped with --no-verify and
      # never runs for a commit made on github.com. main is rebase-only, so every commit a PR carries
      # lands verbatim: lint each one here too. Runs first because it needs nothing built, and a
      # malformed message should be reported before spending the rest of the job on it.
      - name: Lint the commits this PR adds
        run: >-
          pnpm exec commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose

      - run: pnpm lint

      - run: pnpm format:check

      - run: pnpm typecheck

      - run: pnpm test

      # Build is a PR gate, not just a release step. It otherwise ran for the first time at
      # `prepack` — i.e. inside release.yml, after the Version PR was already merged — so a bundle
      # that stopped building surfaced at the one moment nothing can be done about it cheaply.
      - run: pnpm build

  artifact:
    name: Published artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      # pnpm comes from corepack, pinned by `packageManager`. The second setup-node
      # wires up the store cache, which needs pnpm on PATH already.
      - run: corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Packs each publishable package and installs the resulting tarball into a clean project
      # outside the workspace. Nothing above this line ever looks at what npm actually ships:
      # `smoke:install` imports packages/<pkg>/src/template.ts straight out of the workspace, so a
      # `files` entry, a `bin`, or the dist bundle could all be broken with every other gate green.
      # Proven, not assumed — emptying the tsconfig `paths` that inlines the private
      # @pauldvlp/template-kit leaves typecheck, test and build all passing, and only this fails.
      - run: pnpm smoke:tarball
