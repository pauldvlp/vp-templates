name: Test

# Fast generator unit tests: runs every package's __tests__/ (Vitest) against its produce() in memory
# — no registry, npm install, or shadcn. Catches broken scope/name substitution and per-option wiring
# on every push and PR. The heavier dependency-resolution gate lives in template-install.yml.

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commitlint:
    name: Commit messages
    # The husky hook only protects a local `git commit` — it can be skipped with
    # --no-verify and never runs for a commit made on github.com. main is rebase-only,
    # so every commit a PR carries lands verbatim: lint each one here too.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - run: corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint the commits this PR adds
        run: >-
          pnpm exec commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      # pnpm comes from corepack, pinned by `packageManager`. The second setup-node
      # wires up the store cache, which needs pnpm on PATH already.
      - run: corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test
