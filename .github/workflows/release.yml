name: Release

# Changesets-driven release that publishes to npm and creates git tags + GitHub Releases.
#
# Auth: npm trusted publishing via OIDC (no tokens). The job runs in the `release` GitHub Environment
# and requests `id-token: write`; each package has a Trusted Publisher on npmjs pinned to this repo +
# `release.yml` + the `release` environment, so npm mints a short-lived credential at publish time and
# attaches provenance automatically.
#
# Flow:
#   1. Land changesets on `main` (via PRs). This workflow opens/updates a "Version Packages" PR that
#      applies them: bumps versions and rewrites each package's CHANGELOG.
#   2. Merge that PR. With no changesets left, the workflow publishes each public package to npm (OIDC)
#      and creates a git tag per package; the action also opens a GitHub Release per tag from the
#      CHANGELOGs. Publishing goes through scripts/release-publish.mjs, which no-ops when every version
#      is already on npm — so routine no-changeset merges don't trip changesets' republish crash.
#
# (template-kit is `private`, so it is never published, tagged, or released.)

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # push the Version PR branch, create + push tags, create GitHub Releases
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # mint the OIDC token npm trusted publishing exchanges for a publish credential

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Matches the `release` environment pinned in each package's npm Trusted Publisher; restrict its
    # deployment branches to `main` in the environment settings for defense in depth.
    environment: release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags so Changesets can diff and tag

      - uses: actions/setup-node@v7
        with:
          node-version: 24 # >= 22.14, required for npm OIDC trusted publishing
          registry-url: https://registry.npmjs.org # writes the base .npmrc npm publishes against

      # pnpm comes from corepack, pinned by `packageManager`. The second setup-node
      # wires up the store cache, which needs pnpm on PATH already.
      - run: corepack enable

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # npm OIDC trusted publishing needs npm >= 11.5.1; Node 24 ships an older npm, so upgrade it.
      # `changeset publish` shells out to this npm, which performs the OIDC exchange + provenance.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Gate: don't publish/tag a broken tree.
      - run: pnpm test

      - uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          # The action's default commit message and PR title are both a bare "Version Packages", which
          # is not Conventional Commits — so the husky commit-msg hook (installed by `prepare` on the
          # install above) rejects the action's `git commit` here, and test.yml's commitlint step would
          # reject the same commit again when the Version PR runs its checks. Give both a conventional
          # `chore:` header so the release bookkeeping commit clears every gate. `chore` is right: this
          # commit only bumps versions + CHANGELOGs, it ships nothing itself — publishing happens after
          # it merges, via the `publish` step below.
          commit: 'chore: version packages'
          title: 'chore: version packages'
          # Publish each public package to npm (OIDC, provenance automatic) and create its git tag +
          # GitHub Release. Runs only once no changesets remain (i.e. after the Version PR is merged).
          # Wrapped in a guard: the action runs this on EVERY no-changeset push (routine test/ci/docs
          # merges too), where a bare `changeset publish` misreads the registry, tries to republish
          # existing versions, and crashes @changesets/cli. release-publish.mjs only delegates to
          # `changeset publish` when a version is genuinely missing from npm, so those merges exit clean.
          publish: node scripts/release-publish.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
