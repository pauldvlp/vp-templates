version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # pnpm 11 defaults to minimumReleaseAge: 1440 (24h) and CI enforces it, so a bump
    # proposed minutes after a release fails `pnpm install --frozen-lockfile` with
    # ERR_PNPM_MINIMUM_RELEASE_AGE_VIOLATION. Wait past that window before proposing.
    cooldown:
      default-days: 2
    # `chore`, not the `fix(deps)` the release-please repos use: releases here come from
    # changeset FILES, never from commit types, so no prefix can cut a version. That has a
    # consequence worth knowing — a bump to a shipped dependency (e.g. @clack/prompts in the
    # generators) reaches npm only once someone adds a changeset for it. Dependabot won't.
    # (Versions inside packages/*/template/** ship too but are invisible to dependabot;
    # template-install.yml sweeps those against the live registry weekly instead.)
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    # Majors are excluded because in this repo they are never a mechanical bump. Every devDependency
    # here is part of a gate or the release path — oxlint/oxfmt decide what `pnpm lint`/`format:check`
    # accept, vitest decides what `pnpm test` even collects, changesets owns publishing — so a major
    # arrives as a config migration with a green-looking PR, not as a version number. The one bump
    # that must never wait on that is a security fix, and those are patches/minors, which are NOT
    # ignored here. Majors are done by hand, one tool at a time, reading its migration notes.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      npm:
        patterns: ['*']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    # Let a fresh action release be exercised elsewhere first — a same-day major landed
    # broken in a sibling repo (pnpm/action-setup@v6 crashed self-installing pnpm 11.12).
    cooldown:
      default-days: 2
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns: ['*']
